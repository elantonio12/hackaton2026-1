services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - hf_cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Simulator has been moved to vps2 — see simulator/docker-compose.vps2.yml
  # It now runs 10,000 containers across CDMX alcaldías with unique IPv6
  # source addresses, posting to this backend over Tailscale.

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ecoruta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  hf_cache:
