services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OSRM_URL=http://osrm:5000
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    restart: unless-stopped

  # Granite TTM R2 inference service. Used to live in the backend image
  # (~1.5 GB just for torch + tsfm_public + the model weights). Extracting
  # it here means:
  #   - the backend image stays lean and can run more uvicorn workers
  #     without multiplying the model footprint in RAM
  #   - the model loads ONCE here, not once per backend worker
  #   - if TTM crashes/OOMs, it doesn't take down the API
  # Backend talks to it at http://ml-service:8001/predict_batch.
  ml-service:
    build: ./ml-service
    env_file:
      - .env
    environment:
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - hf_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s   # first boot loads ~300 MB of model weights
    restart: unless-stopped

  # Sensor simulator has been moved to vps2 — see simulator/docker-compose.vps2.yml
  # It now runs 10,000 containers across CDMX alcaldias with unique IPv6
  # source addresses, posting to this backend over Tailscale.

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ecoruta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Self-hosted OSRM router with CDMX street network. First start downloads
  # the OSM extract and preprocesses the routing graph (~3-5 minutes); the
  # processed graph is persisted to the osrm_data volume so subsequent
  # restarts are instant. The backend talks to it at http://osrm:5000.
  osrm:
    build: ./osrm
    volumes:
      - osrm_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fs http://localhost:5000/route/v1/driving/-99.13,19.43;-99.12,19.44 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 600s

  # Operational truck simulator: 15 trucks across 3 depots, advances along
  # OSRM-generated polylines, posts location updates and collection events
  # to the backend. Authenticates with the same shared sensor token used
  # by the IoT sensor simulator.
  truck-simulator:
    build:
      context: .
      dockerfile: simulator-trucks/Dockerfile
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
      - TICK_SECONDS=5
      - BASE_SPEED_KMH=30
      - DEMO_SPEED_MULT=8
      - COLLECTION_TICKS=2
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  hf_cache:
  osrm_data:
