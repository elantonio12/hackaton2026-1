# IPv6 gateway running on vps2 — accepts connections from 10,000 simulated
# sensors, each binding a unique source address from the /64 block, and
# forwards them over Tailscale to the backend on vps1.
#
# This mirrors real-world IoT architectures: a fleet of sensors with
# their own network identities connecting through a regional aggregation
# point. `access_log` captures every source IPv6 so it can be displayed
# during the pitch ("here are 10,000 distinct sensor identities hitting
# our infrastructure").

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    log_format ipv6_source '$remote_addr - [$time_iso8601] "$request" '
                           'status=$status bytes=$body_bytes_sent '
                           'upstream_time=$upstream_response_time';
    access_log /dev/stdout ipv6_source;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;

    upstream backend_vps1 {
        server 100.89.207.110:8000;
        keepalive 64;
    }

    server {
        listen [::]:8080 ipv6only=on;

        # Only forward the paths the simulator actually needs.
        location /api/v1/containers/readings/bulk {
            proxy_pass http://backend_vps1;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location /api/v1/containers/readings {
            proxy_pass http://backend_vps1;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 "ipv6-gateway ok\n";
        }
    }
}
