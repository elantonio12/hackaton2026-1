name: Build & Deploy

on:
  push:
    branches: [main, backend, frontend]

jobs:
  deploy:
    runs-on: [self-hosted, hackaton]
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy
        run: |
          cp .env.example .env 2>/dev/null || true
          docker compose down
          docker compose build
          docker compose up -d
          docker compose ps
